name: Daily rebuild

# Triggers a Vercel production rebuild once a day so the Instagram feed stays
# fresh: video CDN URLs expire after a few days, and rebuilding also refreshes
# the long-lived access token before its 60-day expiry.
on:
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC daily (~6-7am ET)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK_URL"
          echo "Triggered Vercel rebuild."
